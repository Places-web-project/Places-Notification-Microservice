spring.application.name=places-notification-service
server.port=${SERVER_PORT:8083}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/places}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:places}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:places}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=notification_schema
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.default-schema=notification_schema
spring.flyway.schemas=notification_schema
spring.flyway.locations=classpath:db/migration

spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

notification.from=${NOTIFICATION_FROM:no-reply@places.local}

management.endpoints.web.exposure.include=health,info,prometheus

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
